<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面精灵 - 加菲猫</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    
    .app-container {
      width: 100%;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    .drag-handle {
      width: 40px;
      height: 4px;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 2px;
      cursor: grab;
    }
    
    .toolbar {
      display: none;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .toolbar.visible { display: flex; }
    
    .tool-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .tool-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
    
    .panel {
      display: none;
      position: absolute;
      top: 50px;
      left: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      z-index: 100;
    }
    
    .panel.active { display: block; }
    
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .panel-close {
      margin-left: auto;
      color: #999;
      cursor: pointer;
      font-size: 18px;
    }
    
    /* 天气卡片 */
    .weather-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      color: white;
    }
    
    .weather-icon { font-size: 32px; }
    .weather-info h3 { font-size: 18px; margin-bottom: 2px; }
    .weather-info p { font-size: 12px; opacity: 0.9; }
    
    .weather-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-top: 8px;
      font-size: 13px;
    }
    
    .weather-refresh {
      font-size: 11px;
      color: #6366f1;
      cursor: pointer;
      margin-top: 6px;
      text-align: center;
    }
    
    /* 新闻列表 */
    .news-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
    .news-item {
      padding: 10px;
      background: #f9fafb;
      border-radius: 8px;
      cursor: pointer;
    }
    .news-item:hover { background: #f3f4f6; }
    .news-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
    .news-summary { font-size: 12px; color: #666; margin-bottom: 4px; line-height: 1.4; }
    .news-meta { font-size: 11px; color: #9ca3af; }
    
    .news-refresh {
      text-align: center;
      padding: 10px;
      color: #6366f1;
      font-size: 12px;
      cursor: pointer;
      border-top: 1px solid #eee;
      margin-top: 8px;
    }
    
    /* 日程 */
    .todo-input {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    .todo-input input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
    }
    
    .todo-input button {
      padding: 8px 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    
    .todo-list { display: flex; flex-direction: column; gap: 6px; max-height: 150px; overflow-y: auto; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #f9fafb;
      border-radius: 8px;
    }
    
    .todo-text { flex: 1; font-size: 13px; }
    .todo-delete { color: #ef4444; cursor: pointer; font-size: 12px; }
    
    /* 文件搜索 */
    .search-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    
    .file-result {
      padding: 8px;
      background: #f9fafb;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    
    .file-result:hover { background: #f3f4f6; }
    .file-name { font-weight: 500; color: #333; }
    .file-path { color: #9ca3af; font-size: 11px; }
    
    /* 桌面整理 */
    .organize-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    
    .organize-btn:hover { transform: scale(1.02); }
    
    .organize-result {
      padding: 10px;
      background: #f0fdf4;
      border-radius: 8px;
      font-size: 12px;
      color: #166534;
      white-space: pre-line;
      line-height: 1.6;
    }
    
    .organize-note {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 8px;
    }
    
    /* 加菲猫 */
    .garfield-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    
    .garfield-img {
      width: 100px;
      height: 120px;
      object-fit: contain;
      transition: transform 0.2s;
    }
    
    .garfield-img:hover { transform: scale(1.1); }
    .garfield-img.bounce { animation: bounce 0.5s; }
    .garfield-img.press { transform: scale(0.95); }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    .mood-bubble {
      background: white;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 12px;
      color: #374151;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      max-width: 160px;
      text-align: center;
    }
    
    .action-buttons {
      display: none;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    
    .action-buttons.visible { display: flex; }
    
    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .action-btn:hover { transform: scale(1.1); }
    
    .mood-bar { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
    .mood-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.2); }
    .mood-dot.active { background: linear-gradient(135deg, #6366f1, #818cf8); }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#666;">
      加载中...
    </div>
  </div>

  <script>
    // ============ 应用状态 ============
    const state = {
      emotion: 'calm',
      moodValue: 50,
      message: '你好呀！点击我有惊喜！',
      currentPanel: null,
      todos: [],
      news: [],
      newsPage: 1,
      newsLoading: false,
      weather: null,
      city: '',
      cityInput: '',
      searchResults: [],
      organizeResult: '',
      showButtons: false
    };

    // ============ 更多新闻数据 ============
    const moreNews = [
      { title: '半导体产业迎来发展新机遇', summary: '国产芯片技术突破，科技自立自强迈出重要一步，产业链供应链稳定性增强。', source: '经济日报', url: 'http://www.economicdaily.com.cn' },
      { title: '数字经济成为增长新引擎', summary: '数字技术与实体经济深度融合，新业态新模式不断涌现，为经济发展增添新动力。', source: '光明日报', url: 'http://www.gmw.cn' },
      { title: '新能源发电量创新高', summary: '风电光伏装机容量快速增长，清洁能源占比持续提升，绿色低碳转型加速推进。', source: '科技日报', url: 'http://www.stdaily.com' },
      { title: '医疗科技创新取得新进展', summary: '国产高端医疗装备实现突破，智慧医疗广泛应用，医疗服务水平不断提升。', source: '健康时报', url: 'http://www.jksb.com.cn' },
      { title: '教育数字化转型提速', summary: '智慧教育平台覆盖面扩大，优质教育资源普惠共享，促进教育公平高质量发展。', source: '中国青年报', url: 'http://www.cyol.com' },
    ];

    // ============ 天气服务 ============
    async function fetchWeather(city) {
      try {
        let targetCity = city;
        
        // 如果没有指定城市，尝试通过 Electron API 获取 IP 定位
        if (!targetCity || targetCity.trim() === '') {
          try {
            const ipResult = await window.electronAPI.fetchIP();
            if (ipResult.success && ipResult.city) {
              targetCity = ipResult.city;
            } else {
              targetCity = '北京';
            }
          } catch (e) {
            targetCity = '北京';
          }
        }
        
        // 使用 Electron API 获取天气
        const weatherResult = await window.electronAPI.fetchWeather(targetCity);
        
        if (weatherResult.success && weatherResult.data) {
          state.city = targetCity;
          state.cityInput = targetCity;
          state.weather = weatherResult.data;
        } else {
          state.weather = { temp: '--', condition: '获取失败', humidity: '--' };
        }
        render();
      } catch (e) {
        console.error('天气获取失败:', e);
        state.weather = { temp: '--', condition: '获取失败', humidity: '--' };
        render();
      }
    }

    // 刷新天气（重新定位）
    function refreshWeather() {
      fetchWeather('');
    }

    // ============ 新闻服务 ============
    async function fetchNews(refresh = false) {
      if (refresh) {
        state.newsPage = 1;
        state.news = [];
      }
      
      if (state.newsLoading) return;
      state.newsLoading = true;
      
      // 模拟加载延迟
      await new Promise(r => setTimeout(r, 500));
      
      if (refresh || state.news.length === 0) {
        state.news = moreNews.slice(0, 3);
      } else {
        // 加载更多
        const start = (state.newsPage) * 3;
        const more = moreNews.slice(start, start + 3);
        if (more.length > 0) {
          state.news = [...state.news, ...more];
          state.newsPage++;
        }
      }
      
      state.newsLoading = false;
      render();
    }

    // 加载更多新闻
    function loadMoreNews() {
      fetchNews(false);
    }

    // ============ 情感系统 ============
    function updateEmotion(action) {
      state.showButtons = true;
      
      const messages = {
        pet: ['喵~ 摸头好舒服！', '嘿嘿，最喜欢了！', '继续继续~'],
        feed: ['好吃！谢谢你！', '真美味！', '再来一个！'],
        tap: ['哎呀！', '干嘛呀~', '吓一跳！', '点我干嘛呀？', '陪我玩嘛~']
      };
      
      const list = messages[action] || messages.tap;
      state.message = list[Math.floor(Math.random() * list.length)];
      
      if (action === 'pet') state.moodValue = Math.min(100, state.moodValue + 15);
      if (action === 'feed') state.moodValue = Math.min(100, state.moodValue + 20);
      if (action === 'tap') state.moodValue = Math.min(100, state.moodValue + 5);
      
      const img = document.querySelector('.garfield-img');
      if (img) {
        img.classList.add('press');
        setTimeout(() => img.classList.remove('press'), 100);
        setTimeout(() => {
          img.classList.add('bounce');
          setTimeout(() => img.classList.remove('bounce'), 500);
        }, 100);
      }
      
      render();
    }

    function toggleButtons() {
      state.showButtons = !state.showButtons;
      state.currentPanel = null;
      render();
    }

    // ============ 待办事项 ============
    function addTodo(text) {
      if (!text.trim()) return;
      state.todos.push({ id: Date.now(), text, done: false });
      render();
    }

    function deleteTodo(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      render();
    }

    // ============ 文件搜索 ============
    async function searchFiles(query) {
      if (!query.trim()) {
        state.searchResults = [];
        render();
        return;
      }
      
      state.searchResults = [];
      
      try {
        // 获取桌面路径
        const desktopPath = await window.electronAPI.getDesktopPath();
        
        // 读取桌面文件
        const result = await window.electronAPI.readDir(desktopPath);
        
        if (result.success && result.files) {
          // 过滤匹配的文件
          const queryLower = query.toLowerCase();
          const matchingFiles = result.files.filter(f => 
            !f.isDirectory && f.name.toLowerCase().includes(queryLower)
          );
          
          // 最多显示10个结果
          state.searchResults = matchingFiles.slice(0, 10);
        }
      } catch (e) {
        console.error('文件搜索失败:', e);
      }
      
      render();
    }

    // 打开文件所在文件夹
    async function openFileLocation(filePath) {
      try {
        await window.electronAPI.showItemInFolder(filePath);
      } catch (e) {
        console.error('打开文件夹失败:', e);
      }
    }

    // ============ 桌面整理 ============
    async function organizeDesktop() {
      state.organizeResult = '📁 正在整理桌面文件...';
      render();
      
      try {
        const desktopPath = await window.electronAPI.getDesktopPath();
        const result = await window.electronAPI.readDir(desktopPath);
        
        if (!result.success || !result.files) {
          state.organizeResult = '❌ 无法读取桌面文件';
          render();
          return;
        }
        
        // 文件分类规则
        const categories = {
          '文档': ['.doc', '.docx', '.xls', '.xlsx', '.ppt', '.pptx', '.txt', '.pdf', '.wps'],
          '图片': ['.jpg', '.jpeg', '.png', '.gif', '.bmp', '.svg', '.webp'],
          '视频': ['.mp4', '.avi', '.mov', '.wmv', '.flv', '.mkv'],
          '音乐': ['.mp3', '.wav', '.flac', '.aac', '.ogg', '.m4a'],
          '压缩包': ['.zip', '.rar', '.7z', '.tar', '.gz']
        };
        
        const categoryFiles: Record<string, string[]> = {
          '文档': [], '图片': [], '视频': [], '音乐': [], '压缩包': [], '其他': []
        };
        
        // 分类文件
        for (const file of result.files) {
          if (file.isDirectory) continue;
          
          const ext = getExt(file.name);
          let found = false;
          
          for (const [cat, exts] of Object.entries(categories)) {
            if (exts.includes(ext)) {
              categoryFiles[cat].push(file.name);
              found = true;
              break;
            }
          }
          
          if (!found) {
            categoryFiles['其他'].push(file.name);
          }
        }
        
        // 创建分类文件夹并移动文件
        let movedCount = 0;
        let summary = '📁 桌面整理完成\n\n';
        
        for (const [cat, files] of Object.entries(categoryFiles)) {
          if (files.length === 0) continue;
          
          const catFolder = path.join(desktopPath, cat);
          
          // 创建分类文件夹
          await window.electronAPI.createFolder(catFolder);
          
          // 移动文件
          for (const fileName of files) {
            const src = path.join(desktopPath, fileName);
            const dest = path.join(catFolder, fileName);
            await window.electronAPI.moveFile(src, dest);
            movedCount++;
          }
          
          // 添加到摘要
          const icon = cat === '文档' ? '📄' : cat === '图片' ? '🖼️' : cat === '视频' ? '📹' : cat === '音乐' ? '🎵' : cat === '压缩包' ? '📦' : '📁';
          summary += `${icon} ${cat} ${files.length} 个 → 已移动到 "${cat}" 文件夹\n`;
        }
        
        summary += `\n✅ 共整理 ${movedCount} 个文件`;
        state.organizeResult = summary;
        
      } catch (e) {
        console.error('整理失败:', e);
        state.organizeResult = '❌ 整理失败: ' + e.message;
      }
      
      render();
    }
    
    // 文件扩展名辅助函数
    function getExt(filename: string): string {
      const lastDot = filename.lastIndexOf('.');
      return lastDot > 0 ? filename.substring(lastDot).toLowerCase() : '';
    }

    // ============ 面板切换 ============
    function showPanel(panel) {
      state.currentPanel = state.currentPanel === panel ? null : panel;
      state.showButtons = true;
      
      // 打开面板时加载对应数据
      if (panel === 'weather' && !state.weather) {
        fetchWeather('');
      }
      if (panel === 'news' && state.news.length === 0) {
        fetchNews(true);
      }
      
      render();
    }

    function closePanel() {
      state.currentPanel = null;
      render();
    }

    // ============ 渲染 ============
    function render() {
      const root = document.getElementById('root');
      const moodDots = Math.ceil(state.moodValue / 20);
      
      const garfieldSVG = `
        <svg viewBox="0 0 200 220" width="100" height="120">
          <ellipse cx="100" cy="170" rx="55" ry="40" fill="#FF8C42"/>
          <ellipse cx="100" cy="175" rx="35" ry="25" fill="#FFE8D0"/>
          <ellipse cx="100" cy="70" rx="60" ry="50" fill="#FF8C42"/>
          <ellipse cx="55" cy="35" rx="18" ry="22" fill="#FF8C42"/>
          <ellipse cx="55" cy="38" rx="10" ry="12" fill="#FFB6C1"/>
          <ellipse cx="145" cy="35" rx="18" ry="22" fill="#FF8C42"/>
          <ellipse cx="145" cy="38" rx="10" ry="12" fill="#FFB6C1"/>
          <ellipse cx="80" cy="60" rx="12" ry="14" fill="white"/>
          <ellipse cx="120" cy="60" rx="12" ry="14" fill="white"/>
          <ellipse cx="82" cy="62" rx="7" ry="9" fill="#2D2D2D"/>
          <ellipse cx="122" cy="62" rx="7" ry="9" fill="#2D2D2D"/>
          <ellipse cx="100" cy="78" rx="8" ry="5" fill="#FF6B6B"/>
          <path d="M92 85 Q100 92 108 85" stroke="#8B4513" stroke-width="2" fill="none"/>
          <ellipse cx="60" cy="75" rx="10" ry="6" fill="#FFB6C1" opacity="0.5"/>
          <ellipse cx="140" cy="75" rx="10" ry="6" fill="#FFB6C1" opacity="0.5"/>
          <ellipse cx="40" cy="120" rx="15" ry="30" fill="#FF8C42" transform="rotate(30 40 120)"/>
          <ellipse cx="160" cy="120" rx="15" ry="30" fill="#FF8C42" transform="rotate(-30 160 120)"/>
          <ellipse cx="70" cy="205" rx="15" ry="10" fill="#FF8C42"/>
          <ellipse cx="130" cy="205" rx="15" ry="10" fill="#FF8C42"/>
          <path d="M150 180 Q180 170 175 150" stroke="#FF8C42" stroke-width="12" fill="none" stroke-linecap="round"/>
        </svg>
      `;

      root.innerHTML = `
        <div class="app-container">
          <div class="drag-handle"></div>
          
          <div class="toolbar ${state.showButtons ? 'visible' : ''}">
            <button class="tool-btn" onclick="showPanel('weather')">🌤️</button>
            <button class="tool-btn" onclick="showPanel('news')">📰</button>
            <button class="tool-btn" onclick="showPanel('todo')">📝</button>
            <button class="tool-btn" onclick="showPanel('search')">🔍</button>
            <button class="tool-btn" onclick="showPanel('organize')">📁</button>
          </div>
          
          <!-- 天气面板 -->
          <div class="panel ${state.currentPanel === 'weather' ? 'active' : ''}">
            <div class="panel-title">
              🌤️ 天气查询
              <span class="panel-close" onclick="closePanel()">×</span>
            </div>
            <div class="weather-card">
              <div class="weather-icon">${state.weather ? '☀️' : '⏳'}</div>
              <div class="weather-info">
                ${state.weather ? `
                  <h3>${state.city} ${state.weather.temp}°C</h3>
                  <p>${state.weather.condition}</p>
                ` : '<h3>定位中...</h3>'}
              </div>
            </div>
            <input class="weather-input" placeholder="输入城市名称" value="${state.cityInput || ''}" 
              onchange="state.cityInput=this.value; fetchWeather(this.value)">
            <div class="weather-refresh" onclick="refreshWeather()">
              📍 点击自动定位获取当地天气
            </div>
          </div>
          
          <!-- 新闻面板 -->
          <div class="panel ${state.currentPanel === 'news' ? 'active' : ''}">
            <div class="panel-title">
              📰 今日资讯
              <span class="panel-close" onclick="closePanel()">×</span>
            </div>
            <div class="news-list">
              ${state.news.length ? state.news.map(n => `
                <div class="news-item" onclick="window.open('${n.url}')">
                  <div class="news-title">📰 ${n.title}</div>
                  <div class="news-summary">${n.summary}</div>
                  <div class="news-meta">${n.source}</div>
                </div>
              `).join('') : '<div style="color:#9ca3af;text-align:center;padding:20px;">加载中...</div>'}
            </div>
            <div class="news-refresh" onclick="loadMoreNews()">
              ${state.newsLoading ? '加载中...' : '⬇️ 加载更多新闻'}
            </div>
          </div>
          
          <!-- 日程面板 -->
          <div class="panel ${state.currentPanel === 'todo' ? 'active' : ''}">
            <div class="panel-title">
              📝 日程/备忘录
              <span class="panel-close" onclick="closePanel()">×</span>
            </div>
            <div class="todo-input">
              <input placeholder="添加事项..." onkeydown="if(event.key==='Enter')addTodo(this.value)">
              <button onclick="addTodo(this.previousElementSibling.value)">添加</button>
            </div>
            <div class="todo-list">
              ${state.todos.length ? state.todos.map(t => `
                <div class="todo-item ${t.done ? 'completed' : ''}">
                  <input type="checkbox" ${t.done ? 'checked' : ''} onchange="state.todos.find(x=>x.id===${t.id}).done=this.checked;render()">
                  <span class="todo-text">${t.text}</span>
                  <span class="todo-delete" onclick="deleteTodo(${t.id})">删除</span>
                </div>
              `).join('') : '<div style="color:#9ca3af;text-align:center;padding:10px;">暂无事项</div>'}
            </div>
          </div>
          
          <!-- 文件搜索面板 -->
          <div class="panel ${state.currentPanel === 'search' ? 'active' : ''}">
            <div class="panel-title">
              🔍 文件搜索
              <span class="panel-close" onclick="closePanel()">×</span>
            </div>
            <input class="search-input" placeholder="输入文件名..." oninput="searchFiles(this.value)">
            <div class="todo-list">
              ${state.searchResults.length ? state.searchResults.map(f => `
                <div class="file-result" onclick="openFileLocation('${f.path}')">
                  <div class="file-name">📄 ${f.name}</div>
                  <div class="file-path">${f.path}</div>
                </div>
              `).join('') : '<div style="color:#9ca3af;text-align:center;padding:10px;">输入文件名搜索（点击打开所在文件夹）</div>'}
            </div>
          </div>
          
          <!-- 桌面整理面板 -->
          <div class="panel ${state.currentPanel === 'organize' ? 'active' : ''}">
            <div class="panel-title">
              📁 桌面整理
              <span class="panel-close" onclick="closePanel()">×</span>
            </div>
            <button class="organize-btn" onclick="organizeDesktop()">
              🗂️ 一键整理桌面文件
            </button>
            ${state.organizeResult ? `<div class="organize-result">${state.organizeResult}</div>` : ''}
            <div class="organize-note">💡 Electron 环境下可实现真正的自动整理</div>
          </div>
          
          <!-- 加菲猫 -->
          <div class="garfield-container" onclick="toggleButtons()">
            <div class="garfield-img" onclick="event.stopPropagation(); updateEmotion('tap')">
              ${garfieldSVG}
            </div>
            <div class="mood-bubble">${state.message}</div>
            <div class="mood-bar">
              ${[1,2,3,4,5].map(i => `<div class="mood-dot ${i <= moodDots ? 'active' : ''}"></div>`).join('')}
            </div>
            <div class="action-buttons ${state.showButtons ? 'visible' : ''}">
              <button class="action-btn" onclick="event.stopPropagation(); updateEmotion('pet')" title="抚摸">🤚</button>
              <button class="action-btn" onclick="event.stopPropagation(); updateEmotion('feed')" title="投喂">🍪</button>
            </div>
          </div>
        </div>
      `;
    }

    // ============ 初始化 ============
    fetchWeather('');
    fetchNews(true);
    render();
    
    console.log('🐱 桌面精灵已启动');
  </script>
</body>
</html>
