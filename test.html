<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>桌面精灵</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: transparent; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      width: 200px;
      padding: 15px;
      background: rgba(255,255,255,0.85);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      text-align: center;
    }
    .drag-handle {
      width: 36px;
      height: 4px;
      background: rgba(0,0,0,0.15);
      border-radius: 2px;
      margin: 0 auto 10px;
      cursor: grab;
    }
    .garfield {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .garfield:hover { transform: scale(1.05); }
    .message {
      background: white;
      padding: 8px 14px;
      border-radius: 12px;
      margin-top: 10px;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: inline-block;
    }
    .mood {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 8px;
    }
    .mood-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e5e7eb;
    }
    .mood-dot.active { background: #6366f1; }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    .btn:hover { transform: scale(1.1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="drag-handle"></div>
    
    <div class="garfield" onclick="interact('body')">
      <svg viewBox="0 0 200 180" width="120" height="110">
        <defs>
          <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FF9A5C"/>
            <stop offset="100%" stop-color="#E67332"/>
          </linearGradient>
        </defs>
        <ellipse cx="100" cy="130" rx="50" ry="40" fill="url(#body)"/>
        <circle cx="100" cy="60" r="45" fill="url(#body)"/>
        <circle cx="60" cy="25" r="14" fill="#FF8C42"/>
        <circle cx="140" cy="25" r="14" fill="#FF8C42"/>
        <circle cx="78" cy="50" r="10" fill="white"/>
        <circle cx="122" cy="50" r="10" fill="white"/>
        <circle cx="78" cy="52" r="6" fill="#333"/>
        <circle cx="122" cy="52" r="6" fill="#333"/>
        <ellipse cx="100" cy="65" rx="6" ry="4" fill="#FF6B6B"/>
        <path d="M90 72 Q100 80 110 72" stroke="#8B4513" stroke-width="2" fill="none"/>
        <circle cx="55" cy="65" r="8" fill="#FFB6C1" opacity="0.5"/>
        <circle cx="145" cy="65" r="8" fill="#FFB6C1" opacity="0.5"/>
        <ellipse cx="40" cy="95" rx="10" ry="20" fill="#FF8C42" transform="rotate(20 40 95)"/>
        <ellipse cx="160" cy="95" rx="10" ry="20" fill="#FF8C42" transform="rotate(-20 160 95)"/>
        <ellipse cx="70" cy="165" rx="12" ry="8" fill="#FF8C42"/>
        <ellipse cx="130" cy="165" rx="12" ry="8" fill="#FF8C42"/>
        <path d="M145 145 Q175 135 170 115" stroke="#FF8C42" stroke-width="10" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    
    <div class="message" id="msg">你好！我是加菲猫~</div>
    
    <div class="mood">
      <div class="mood-dot active"></div>
      <div class="mood-dot active"></div>
      <div class="mood-dot active"></div>
      <div class="mood-dot"></div>
      <div class="mood-dot"></div>
    </div>
    
    <div class="buttons">
      <button class="btn" onclick="interact('head')">🤚</button>
      <button class="btn" onclick="feed()">🍪</button>
    </div>
  </div>

  <script>
    const messages = {
      head: '喵~ 摸头好舒服！',
      body: '嘿嘿，痒痒~',
      arm: '这是我的手臂！',
      foot: '别挠我脚脚！哈哈！',
      feed: '好吃！谢谢你！'
    };
    
    function interact(part) {
      document.getElementById('msg').textContent = messages[part] || '你好~';
    }
    
    function feed() {
      document.getElementById('msg').textContent = '好吃！谢谢你！';
    }
  </script>
</body>
</html>
